<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órbita SAN - Soldadura VR & XR</title>
  
  <!-- Librería de A-Frame VR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Google Fonts para la pantalla de bienvenida 2D -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
    #pantalla-inicio { position: fixed; inset: 0; z-index: 999; background: radial-gradient(circle at center, #050510 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 20px; transition: opacity 1s ease-in-out; }
    #pantalla-inicio::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.3; pointer-events: none; }
    
    #pantalla-inicio h2 { font-size: 1.2rem; color: #a0a0ff; margin-bottom: 0; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
    #pantalla-inicio h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: #e0d070; margin-top: 0; margin-bottom: 0.5rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(224, 208, 112, 0.3); }
    #pantalla-inicio p { color: #bbb; font-size: 1.1rem; margin-bottom: 3rem; line-height: 1.6; max-width: 600px; }
    
    #btn-entrar { padding: 16px 56px; background: rgba(224, 208, 112, 0.05); border: 1px solid #e0d070; border-radius: 50px; color: #e0d070; font-size: 1.2rem; cursor: pointer; letter-spacing: 3px; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(224, 208, 112, 0.1); }
    #btn-entrar:hover { background: #e0d070; color: #000; box-shadow: 0 0 30px rgba(224, 208, 112, 0.6); transform: scale(1.05); }
  </style>

  <script>
    // Generador dinámico de texturas de respaldo para simular las imágenes en la previsualización local si fallan
    window.crearRespaldo = function(img, texto, esTarjeta) {
      const canvas = document.createElement('canvas');
      canvas.width = esTarjeta ? 512 : 256;
      canvas.height = esTarjeta ? 307 : 85;
      const ctx = canvas.getContext('2d');
      
      if (esTarjeta) {
        // Tarjeta Explicativa Simulada de Alta Calidad
        ctx.fillStyle = '#060612';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#e0d070';
        ctx.lineWidth = 6;
        ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
        
        ctx.fillStyle = '#e0d070';
        ctx.font = 'bold 30px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(texto.toUpperCase(), canvas.width / 2, 60);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px sans-serif';
        ctx.fillText('Tarjeta Técnica Interactiva', canvas.width / 2, 130);
        ctx.fillStyle = '#8888aa';
        ctx.fillText('Soldadura en Atmósfera Natural', canvas.width / 2, 170);
        ctx.fillText('(Archivo real: ' + texto + '.png)', canvas.width / 2, 205);
        
        ctx.fillStyle = '#4df0ff';
        ctx.font = 'italic 12px sans-serif';
        ctx.fillText('ÓRBITA SAN - CONEXIÓN ACTIVA', canvas.width / 2, 260);
      } else {
        // Término Flotante Simulado
        ctx.fillStyle = 'rgba(10, 10, 20, 0.9)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(texto.toUpperCase(), canvas.width / 2, canvas.height / 2);
      }
      
      img.src = canvas.toDataURL();
      img.onerror = null; // Evita bucles de error infinitos
    };

    // Mapeo preciso entre el ID de concepto y la ID de la tarjeta explicativa original (PNG limpios sin prefijo)
    const ASOCIACIONES_SAN = {
      'concept_ac': { cardId: '#card_ac' },
      'concept_arco': { cardId: '#card_arco' },
      'concept_bano': { cardId: '#card_bano' },
      'concept_cordon': { cardId: '#card_cordon' },
      'concept_dc': { cardId: '#card_dc' },
      'concept_e6013': { cardId: '#card_e6013' },
      'concept_e7016': { cardId: '#card_e7016' },
      'concept_e7018': { cardId: '#card_e7018' },
      'concept_e7024': { cardId: '#card_e7024' },
      'concept_electrodo': { cardId: '#card_electrodo' },
      'concept_escoria': { cardId: '#card_escoria' },
      'concept_higroscopico': { cardId: '#card_higroscopico' },
      'concept_intensidad': { cardId: '#card_intensidad' },
      'concept_ionizacion': { cardId: '#card_ionizacion' },
      'concept_masa': { cardId: '#card_masa' },
      'concept_penetracion': { cardId: '#card_penetracion' },
      'concept_piqueta': { cardId: '#card_piqueta' },
      'concept_plasma': { cardId: '#card_plasma' },
      'concept_polaridad': { cardId: '#card_polaridad' },
      'concept_polaridad_directa': { cardId: '#card_polaridad_directa' },
      'concept_polaridad_inversa': { cardId: '#card_polaridad_inversa' },
      'concept_revestimiento': { cardId: '#card_revestimiento' },
      'concept_tension': { cardId: '#card_tension' },
      'concept_wps': { cardId: '#card_wps' },
      'concept_zat': { cardId: '#card_zat' }
    };

    // Componente de oscilación y flotación sutil e independiente
    AFRAME.registerComponent('movimiento-vivo', {
      init: function () {
        this.homePos = new THREE.Vector3().copy(this.el.object3D.position);
        this.proximoDestino();
      },
      proximoDestino: function () {
        const el = this.el;
        if (!el) return;
        
        // Desplazamiento sutil e independiente en ejes X, Y y Z para simular flotación
        const targetX = this.homePos.x + (Math.random() - 0.5) * 0.8;
        const targetY = this.homePos.y + (Math.random() - 0.5) * 0.6;
        const targetZ = this.homePos.z + (Math.random() - 0.5) * 0.6;
        const duracion = 5000 + Math.random() * 4000;

        el.setAttribute('animation__pos', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: duracion,
          easing: 'easeInOutSine'
        });
        
        setTimeout(() => { if (this.el) this.proximoDestino(); }, duracion);
      }
    });

    // Componente para rotar la cámara (Snap Turn) usando el Joystick del mando derecho
    AFRAME.registerComponent('joystick-turn', {
      schema: {
        rig: {type: 'selector', default: '#rig'},
        angle: {type: 'number', default: 45}, // Grados a girar por cada toque lateral del stick
        cooldown: {type: 'number', default: 400} // Tiempo de espera en milisegundos
      },
      init: function () {
        this.canTurn = true;
        this.handleThumbstick = this.handleThumbstick.bind(this);
        this.handleAxisMove = this.handleAxisMove.bind(this);
        
        // Escucha eventos del joystick en mandos de Meta Quest
        this.el.addEventListener('thumbstickmoved', this.handleThumbstick);
        this.el.addEventListener('axismove', this.handleAxisMove);
      },
      handleThumbstick: function (evt) {
        this.processTurn(evt.detail.x);
      },
      handleAxisMove: function (evt) {
        // Fallback estándar de ejes WebXR para mandos genéricos
        if (evt.detail.axis) {
          const xVal = evt.detail.axis || evt.detail.axis || 0;
          this.processTurn(xVal);
        }
      },
      processTurn: function (xVal) {
        if (!this.canTurn) return;

        // Umbral de activación para evitar rotaciones accidentales por holgura del stick
        if (Math.abs(xVal) > 0.65) {
          const rig = this.data.rig;
          const currentRotation = rig.getAttribute('rotation') || {x: 0, y: 0, z: 0};
          
          // Joystick derecha (gira espacio a la derecha/rig a la izquierda) o viceversa
          const rotationOffset = xVal > 0 ? -this.data.angle : this.data.angle;
          
          currentRotation.y += rotationOffset;
          rig.setAttribute('rotation', currentRotation);

          // Activa tiempo de espera de cortesía
          this.canTurn = false;
          setTimeout(() => {
            this.canTurn = true;
          }, this.data.cooldown);
        }
      }
    });

    // Componente interactivo para punteros láser de Quest 3 y mouse en PC
    AFRAME.registerComponent('palabra-interactiva', {
      schema: { idConcepto: {type: 'string'} },
      init: function () {
        var el = this.el;
        var data = this.data;

        // Hover: El término visual brilla en dorado SAN y aumenta su tamaño sutilmente
        el.addEventListener('mouseenter', function () {
          var parent = el.parentNode;
          var img = parent.querySelector('a-image');
          if (img) {
            img.setAttribute('color', '#e0d070');
            img.setAttribute('scale', '1.25 1.25 1.25');
          }
        });

        // Leave: Regresa al color y escala originales
        el.addEventListener('mouseleave', function () {
          var parent = el.parentNode;
          var img = parent.querySelector('a-image');
          if (img) {
            img.setAttribute('color', '#ffffff');
            img.setAttribute('scale', '1 1 1');
          }
        });

        // Click / Trigger: Cambia la textura del panel explicativo por la tarjeta correspondiente
        el.addEventListener('click', function () {
          var asociacion = ASOCIACIONES_SAN[data.idConcepto];
          if (!asociacion) return;

          var panel = document.querySelector('#panel-info-dinamico');
          var cardImagen = document.querySelector('#card-contenido-img');
          
          // Cambia la textura de la tarjeta de explicación por la ID precargada en GPU
          cardImagen.setAttribute('src', asociacion.cardId);
          
          // Abre el panel explicativo de manera frontal y fluida
          panel.setAttribute('visible', 'true');
          panel.setAttribute('animation__abrir', 'property: scale; from: 0.01 0.01 0.01; to: 1 1 1; dur: 450; easing: easeOutBack');
        });
      }
    });

    // Componente para alternar entre el modo VR (Cielo espacial) e XR (Passthrough/Mixto)
    AFRAME.registerComponent('control-entorno', {
      schema: { modo: {type: 'string'} },
      init: function () {
        var el = this.el;
        var modo = this.data.modo;

        el.addEventListener('mouseenter', function () {
          el.setAttribute('scale', '1.1 1.1 1.1');
        });
        el.addEventListener('mouseleave', function () {
          el.setAttribute('scale', '1 1 1');
        });

        el.addEventListener('click', function () {
          var scene = document.querySelector('a-scene');
          var estrellas = document.querySelector('#estrellas');
          var btnVR = document.querySelector('#btn-vr-active');
          var btnXR = document.querySelector('#btn-xr-active');

          if (modo === 'xr') {
            // Desactiva niebla y estrellas para dejar paso limpio al Passthrough real
            scene.setAttribute('fog', 'density: 0');
            estrellas.setAttribute('visible', 'false');
            scene.setAttribute('background', 'transparent: true; color: #000');
            
            // Actualización visual de los botones 3D de control
            btnVR.setAttribute('color', '#111122');
            btnXR.setAttribute('color', '#e0d070');
            btnVR.querySelector('a-text').setAttribute('color', '#ffffff');
            btnXR.querySelector('a-text').setAttribute('color', '#000000');
          } else {
            // Reestablece el espacio cósmico y la atmósfera misteriosa (Modo VR)
            scene.setAttribute('fog', 'type: exponential; color: #000008; density: 0.06');
            estrellas.setAttribute('visible', 'true');
            scene.setAttribute('background', 'color: #000005');
            
            // Actualización visual de los botones 3D de control
            btnVR.setAttribute('color', '#e0d070');
            btnXR.setAttribute('color', '#111122');
            btnVR.querySelector('a-text').setAttribute('color', '#000000');
            btnXR.querySelector('a-text').setAttribute('color', '#ffffff');
          }
        });
      }
    });
  </script>
</head>
<body>

<!-- Pantalla de Bienvenida (Capa 2D) -->
<div id="pantalla-inicio">
  <h2>MÓDULO SAN</h2>
  <h1>ÓRBITA SAN</h1>
  <p>Glosario de Soldadura en Atmósfera Natural interactivo.<br>
  <small style="font-size: 0.85rem; color:#888; margin-top:10px; display:inline-block;">Apunta a las palabras flotantes y pulsa el gatillo de tus mandos de Meta Quest 3 o haz clic en PC.</small></p>
  <button id="btn-entrar" onclick="iniciar()">ENTRAR</button>
</div>

<!-- Escena VR de A-Frame -->
<a-scene background="color:#000005" 
         fog="type: exponential; color: #000008; density: 0.06" 
         renderer="antialias: true; colorManagement: true;"
         webxr="referenceSpaceType: localFloor; optionalFeatures: pass-through;"
         cursor="rayOrigin: mouse"
         raycaster="objects: .interactable; interval: 100">
  
  <a-assets timeout="15000">
    <!-- Precarga de todas las tarjetas explicativas diseñadas (cards limpias sin prefijos) -->
    <img id="card_ac" src="./ac.png" onerror="window.crearRespaldo(this, 'ac', true)">
    <img id="card_arco" src="./arco-electrico.png" onerror="window.crearRespaldo(this, 'arco-electrico', true)">
    <img id="card_bano" src="./bano-de-fusion.png" onerror="window.crearRespaldo(this, 'bano-de-fusion', true)">
    <img id="card_cordon" src="./cordon.png" onerror="window.crearRespaldo(this, 'cordon', true)">
    <img id="card_dc" src="./dc.png" onerror="window.crearRespaldo(this, 'dc', true)">
    <img id="card_e6013" src="./e6013.png" onerror="window.crearRespaldo(this, 'e6013', true)">
    <img id="card_e7016" src="./e7016.png" onerror="window.crearRespaldo(this, 'e7016', true)">
    <img id="card_e7018" src="./e7018.png" onerror="window.crearRespaldo(this, 'e7018', true)">
    <img id="card_e7024" src="./e7024.png" onerror="window.crearRespaldo(this, 'e7024', true)">
    <img id="card_electrodo" src="./electrodo.png" onerror="window.crearRespaldo(this, 'electrodo', true)">
    <img id="card_escoria" src="./escoria.png" onerror="window.crearRespaldo(this, 'escoria', true)">
    <img id="card_higroscopico" src="./higroscopico.png" onerror="window.crearRespaldo(this, 'higroscopico', true)">
    <img id="card_intensidad" src="./intensidad-de-corriente.png" onerror="window.crearRespaldo(this, 'intensidad-de-corriente', true)">
    <img id="card_ionizacion" src="./ionizacion.png" onerror="window.crearRespaldo(this, 'ionizacion', true)">
    <img id="card_masa" src="./masa.png" onerror="window.crearRespaldo(this, 'masa', true)">
    <img id="card_penetracion" src="./penetracion.png" onerror="window.crearRespaldo(this, 'penetracion', true)">
    <img id="card_piqueta" src="./piqueta.png" onerror="window.crearRespaldo(this, 'piqueta', true)">
    <img id="card_plasma" src="./plasma.png" onerror="window.crearRespaldo(this, 'plasma', true)">
    <img id="card_polaridad" src="./polaridad.png" onerror="window.crearRespaldo(this, 'polaridad', true)">
    <img id="card_polaridad_directa" src="./polaridad-directa-dcminus.png" onerror="window.crearRespaldo(this, 'polaridad-directa-dcminus', true)">
    <img id="card_polaridad_inversa" src="./polaridad-inversa-dcplus.png" onerror="window.crearRespaldo(this, 'polaridad-inversa-dcplus', true)">
    <img id="card_revestimiento" src="./revestimiento.png" onerror="window.crearRespaldo(this, 'revestimiento', true)">
    <img id="card_tension" src="./tension.png" onerror="window.crearRespaldo(this, 'tension', true)">
    <img id="card_wps" src="./wps.png" onerror="window.crearRespaldo(this, 'wps', true)">
    <img id="card_zat" src="./zat.png" onerror="window.crearRespaldo(this, 'zat', true)">

    <!-- Precarga de todas las palabras flotantes en caché de la GPU con fallback onerror -->
    <img id="term_ac" src="./termino_ac.png" onerror="window.crearRespaldo(this, 'AC', false)">
    <img id="term_arco" src="./termino_arco-electrico.png" onerror="window.crearRespaldo(this, 'Arco Eléctrico', false)">
    <img id="term_bano" src="./termino_bano-de-fusion.png" onerror="window.crearRespaldo(this, 'Baño de Fusión', false)">
    <img id="term_cordon" src="./termino_cordon.png" onerror="window.crearRespaldo(this, 'Cordón', false)">
    <img id="term_dc" src="./termino_dc.png" onerror="window.crearRespaldo(this, 'DC', false)">
    <img id="term_e6013" src="./termino_e6013.png" onerror="window.crearRespaldo(this, 'E6013', false)">
    <img id="term_e7016" src="./termino_e7016.png" onerror="window.crearRespaldo(this, 'E7016', false)">
    <img id="term_e7018" src="./termino_e7018.png" onerror="window.crearRespaldo(this, 'E7018', false)">
    <img id="term_e7024" src="./termino_e7024.png" onerror="window.crearRespaldo(this, 'E7024', false)">
    <img id="term_electrodo" src="./termino_electrodo.png" onerror="window.crearRespaldo(this, 'Electrodo', false)">
    <img id="term_escoria" src="./termino_escoria.png" onerror="window.crearRespaldo(this, 'Escoria', false)">
    <img id="term_higroscopico" src="./termino_higroscopico.png" onerror="window.crearRespaldo(this, 'Higroscópico', false)">
    <img id="term_intensidad" src="./termino_intensidad-de-corriente.png" onerror="window.crearRespaldo(this, 'Intensidad', false)">
    <img id="term_ionizacion" src="./termino_ionizacion.png" onerror="window.crearRespaldo(this, 'Ionización', false)">
    <img id="term_masa" src="./termino_masa.png" onerror="window.crearRespaldo(this, 'Masa', false)">
    <img id="term_penetracion" src="./termino_penetracion.png" onerror="window.crearRespaldo(this, 'Penetración', false)">
    <img id="term_piqueta" src="./termino_piqueta.png" onerror="window.crearRespaldo(this, 'Piqueta', false)">
    <img id="term_plasma" src="./termino_plasma.png" onerror="window.crearRespaldo(this, 'Plasma', false)">
    <img id="term_polaridad" src="./termino_polaridad.png" onerror="window.crearRespaldo(this, 'Polaridad', false)">
    <img id="term_polaridad_directa" src="./termino_polaridad-directa-dcminus.png" onerror="window.crearRespaldo(this, 'Polaridad Directa DC-', false)">
    <img id="term_polaridad_inversa" src="./termino_polaridad-inversa-dcplus.png" onerror="window.crearRespaldo(this, 'Polaridad Inversa DC+', false)">
    <img id="term_revestimiento" src="./termino_revestimiento.png" onerror="window.crearRespaldo(this, 'Revestimiento', false)">
    <img id="term_tension" src="./termino_tension.png" onerror="window.crearRespaldo(this, 'Tensión', false)">
    <img id="term_wps" src="./termino_wps.png" onerror="window.crearRespaldo(this, 'WPS', false)">
    <img id="term_zat" src="./termino_zat.png" onerror="window.crearRespaldo(this, 'ZAT', false)">

    <!-- Referencia de audio de fondo cargada localmente -->
    <audio id="musica-fondo" src="./orbitaSAN.mp3" loop preload="auto"></audio>
    
    <!-- Textura de seguridad de carga provisional -->
    <img id="fallback" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
  </a-assets>

  <!-- Luces estéticas de ambiente y apoyo -->
  <a-light type="ambient" color="#111122"></a-light>
  <a-light type="point" position="0 5 0" color="#5555aa" intensity="0.6"></a-light>
  
  <!-- Espacio estelar dinámico -->
  <a-entity id="estrellas"></a-entity>

  <!-- PANEL DE SELECCIÓN DE ENTORNO DISCRETO (VR vs XR) -->
  <!-- Reubicado bajo la línea del horizonte (Y: 0.7, Z: -1.2) e inclinado ligeramente hacia arriba (-40°) para no obstruir la órbita de conceptos -->
  <a-entity id="consola-entorno" position="-1.0 0.7 -1.2" rotation="-40 40 0">
    <a-plane width="0.9" height="0.6" color="#000" opacity="0.95" material="shader:flat">
      <!-- Borde sutil del panel -->
      <a-plane width="0.93" height="0.63" color="#e0d070" position="0 0 -0.01" opacity="0.3" material="shader:flat"></a-plane>
      
      <a-text value="ENTORNO" font="exo2bold" align="center" color="#e0d070" width="2.2" position="0 0.20 0.01"></a-text>
      
      <!-- Botón Modo VR -->
      <a-plane id="btn-vr-active" class="interactable" control-entorno="modo: vr" width="0.75" height="0.13" color="#e0d070" position="0 0.04 0.02" material="shader:flat">
        <a-text value="VR ESPACIO" font="exo2bold" align="center" color="#000" width="1.8"></a-text>
      </a-plane>

      <!-- Botón Modo XR (Realidad Mixta Passthrough) -->
      <a-plane id="btn-xr-active" class="interactable" control-entorno="modo: xr" width="0.75" height="0.13" color="#111122" position="0 -0.13 0.02" material="shader:flat">
        <a-text value="XR MIXTA" font="exo2bold" align="center" color="#fff" width="1.8"></a-text>
      </a-plane>
    </a-plane>
  </a-entity>

  <!-- NUBE DE TÉRMINOS FLOTANTES EN 360 GRADOS (Distribución cilíndrica constante) -->
  <a-entity id="nube-palabras" position="0 0 0" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 75000; easing: linear">
    
    <!-- 1. AC (Ángulo 0.0°) -->
    <a-entity movimiento-vivo position="0 1.7 -3.2">
      <a-image src="#term_ac" width="1.2" height="0.4" material="shader: flat; transparent: true; alphaTest: 0.5"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_ac" width="1.6" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 2. Arco Eléctrico (Ángulo 14.4°) -->
    <a-entity movimiento-vivo position="0.80 1.3 -3.10" rotation="0 -14.4 0">
      <a-image src="#term_arco" width="1.8" height="0.6" material="shader: flat; transparent: true; alphaTest: 0.5"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_arco" width="2.2" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 3. Baño de Fusión (Ángulo 28.8°) -->

               onclick="document.querySelector('#panel-info-dinamico').setAttribute('visible', 'false')">

  <!-- RIG DE CÁMARA Y MANDOS QUEST 3 (Configuración completa de controles con giro de joystick en el mando derecho) -->

    <a-camera position="0 1.6 0" wasd-controls look-controls="pointerLockEnabled: false"></a-camera>
    
    <!-- Mando Izquierdo (Láser Azul de Selección) -->
    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10; showLine: true" line="color: #4444aa; opacity: 0.5"></a-entity>
    
    <!-- Mando Derecho (Láser Dorado + Sistema de Giro de Espacio con Joystick) -->
    <a-entity id="control-derecho" laser-controls="hand:right" raycaster="objects: .interactable; far:10; showLine: true" line="color: #e0d070; opacity: 0.5" joystick-turn></a-entity>
  </a-entity>

<script>
  // Inicialización de música de fondo y desvanecimiento de la pantalla de carga
  function iniciar() {
    document.getElementById('pantalla-inicio').style.opacity = '0';
    const audio = document.getElementById('musica-fondo');
    if (audio) {
      audio.volume = 0.45;
      audio.play().catch(e => console.log("Interacción requerida por el navegador para reproducir audio."));
    }
    setTimeout(() => { 
      document.getElementById('pantalla-inicio').style.display = 'none';
      document.getElementById('nube-palabras').setAttribute('visible', 'true');
    }, 1000);
  }

  // Generador estético de campo de estrellas 3D
  function crearEstrellas() {
    const contenedor = document.getElementById('estrellas');
    for (let i = 0; i < 250; i++) {
      const e = document.createElement('a-sphere');
      const r = 25 + Math.random() * 10;
      const t = Math.random() * Math.PI * 2;
      const p = Math.random() * Math.PI;
      e.setAttribute('position', `${r * Math.sin(p) * Math.cos(t)} ${r * Math.cos(p)} ${r * Math.sin(p) * Math.sin(t)}`);
      e.setAttribute('radius', 0.02 + Math.random() * 0.04);
      e.setAttribute('material', 'color: #ffffff; shader: flat');
      contenedor.appendChild(e);
    }
  }

  // Acceso inmediato si el visor Meta Quest 3 inicia directo en modo VR/XR
  document.querySelector('a-scene').addEventListener('enter-vr', () => {
    document.getElementById('pantalla-inicio').style.display = 'none';
    const audio = document.getElementById('musica-fondo');
    if (audio) audio.play().catch(e => {});
    document.getElementById('nube-palabras').setAttribute('visible', 'true');

    // Auto-activar configuración XR si detectamos que ha entrado específicamente en modo AR (Passthrough)
    var scene = document.querySelector('a-scene');
    if (scene.is('ar-mode')) {
      scene.setAttribute('fog', 'density: 0');
      document.querySelector('#estrellas').setAttribute('visible', 'false');
      scene.setAttribute('background', 'transparent: true; color: #000');
      
      document.querySelector('#btn-vr-active').setAttribute('color', '#111122');
      document.querySelector('#btn-xr-active').setAttribute('color', '#e0d070');
      document.querySelector('#btn-vr-active').querySelector('a-text').setAttribute('color', '#ffffff');
      document.querySelector('#btn-xr-active').querySelector('a-text').setAttribute('color', '#000000');
    }
  });

  window.addEventListener('load', () => { 
    crearEstrellas();
  });
</script>
